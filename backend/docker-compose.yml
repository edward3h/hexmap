services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hexmap
      MYSQL_USER: hexmap
      MYSQL_PASSWORD: hexmap
    ports:
      - "3306:3306"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./seed-campaign2.sql:/docker-entrypoint-initdb.d/03-seed-campaign2.sql:ro
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uhexmap", "-phexmap"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: hexmap
      DB_USER: hexmap
      DB_PASS: hexmap
    volumes:
      - ./public:/var/www/html
      - ./src:/var/www/src
      - ./config.php:/var/www/config.php:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysqldata:
